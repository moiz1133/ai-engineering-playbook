version: "3.9"
services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  flower:
    image: mher/flower
    ports: ["5555:5555"]
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on: [redis]

# Run: docker-compose up -d
# Redis: localhost:6379
# Flower (Celery monitor): http://localhost:5555
